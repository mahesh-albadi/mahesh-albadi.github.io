<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <title>Kannada Nodi Web Practice</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; background: #f4f4f9; }
        #output { width: 80%; height: 100px; font-size: 24px; margin: 20px; padding: 10px; border: 2px solid #333; border-radius: 8px; }
        .keyboard { display: grid; grid-template-columns: repeat(10, 1fr); gap: 10px; max-width: 900px; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        button { padding: 15px 5px; font-size: 20px; cursor: pointer; border: 1px solid #ddd; border-radius: 5px; background: #fdfdfd; transition: 0.2s; }
        button:hover { background: #e0e0e0; border-color: #bbb; }
        button:active { transform: scale(0.95); background: #ccc; }
        .controls { margin-top: 20px; }
        .backspace { background: #ffcccc; }
    </style>
</head>
<body>

    <h2>Kannada Practice Keyboard</h2>
    <textarea id="output" placeholder="Click the strokes below to start writing..."></textarea>

    <div class="keyboard" id="keyboard">
        </div>

    <div class="controls">
        <button class="backspace" onclick="backspace()">Backspace</button>
        <button onclick="clearText()">Clear All</button>
    </div>

    <script>
        const output = document.getElementById('output');
        
        // Define Kannada Strokes (Vowels & Consonants)
        const strokes = [
            'ಅ', 'ಆ', 'ಇ', 'ಈ', 'ಉ', 'ಊ', 'ಋ', 'ಎ', 'ಏ', 'ಐ',
            'ಒ', 'ಓ', 'ಔ', 'ಅಂ', 'ಅಃ', 'ಕ್', 'ಖ್', 'ಗ್', 'ಘ್', 'ಙ್',
            'ಚ್', 'ಛ್', 'ಜ್', 'ಝ್', 'ಞ್', 'ಟ್', 'ಠ್', 'ಡ್', 'ಢ್', 'ಣ್',
            'ತ್', 'ಥ್', 'ದ್', 'ಧ್', 'ನ್', 'ಪ್', 'ಫ್', 'ಬ್', 'ಭ್', 'ಮ್',
            'ಯ್', 'ರ್', 'ಲ್', 'ವ್', 'ಶ್', 'ಷ್', 'ಸ್', 'ಹ್', 'ಳ್', 'ಱ್'
        ];

        // Generate Buttons
        const kb = document.getElementById('keyboard');
        strokes.forEach(s => {
            let btn = document.createElement('button');
            btn.innerText = s;
            btn.onclick = () => addStroke(s);
            kb.appendChild(btn);
        });

        function addStroke(char) {
            output.value += char;
            output.focus();
        }

        function backspace() {
            output.value = output.value.slice(0, -1);
        }

        function clearText() {
            output.value = "";
        }
    </script>
</body>
</html>
